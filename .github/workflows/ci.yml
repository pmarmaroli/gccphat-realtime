name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Test core (bit-exact non-regression)
        run: dotnet test tests/GccPhat.Core.Tests/GccPhat.Core.Tests.csproj -c Release
      - name: Build WPF app
        run: dotnet build src/GccPhat.RealTime/GccPhat.RealTime.csproj -c Release
